<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hikaru Cho's personal link-in-bio page" />
    <title>Hikaru Cho</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-shapes" aria-hidden="true">
      <div class="blob blob-one"></div>
      <div class="blob blob-two"></div>
      <div class="blob blob-three"></div>
    </div>

    <main class="page-shell">
      <section class="card">
        <button class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">
          <span class="toggle-icon">☀️</span>
          <span class="toggle-label">Light mode</span>
        </button>

        <div class="avatar" aria-hidden="true">
          <span>HC</span>
        </div>

        <h1>Hikaru Cho</h1>
        <p class="bio">
          Artist, designer, and storyteller building thoughtful digital experiences.
        </p>

        <nav class="links" aria-label="Social links">
          <a class="link-button" href="https://www.hikarucho.com/" target="_blank" rel="noopener noreferrer">
            <span class="icon">🎨</span>
            <span>Painting</span>
          </a>
          <a class="link-button" href="https://hikarucreate.com/" target="_blank" rel="noopener noreferrer">
            <span class="icon">🖼️</span>
            <span>Portfolio</span>
          </a>
          <a class="link-button" href="https://www.instagram.com/hikaru_cho/" target="_blank" rel="noopener noreferrer">
            <span class="icon">📸</span>
            <span>Instagram</span>
          </a>
          <a class="link-button" href="mailto:hikarucho@gmail.com">
            <span class="icon">✉️</span>
            <span>Email</span>
          </a>
        </nav>

        <footer class="footer">Please don't tell my mom</footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
